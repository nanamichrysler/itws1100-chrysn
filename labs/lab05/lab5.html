<!DOCTYPE html>
<html lang="en">

<head>
   <title>Lab 5</title>
   <meta charset="UTF-8">
   <link href="./resources/lab5.css" rel="stylesheet" type="text/css">
   <script src="./resources/lab5.js"></script>
</head>

<body>
   <div id="bodyBlock">
      <form id="addForm" name="addForm" action="#" method="post" onsubmit="return validate(this);">
         <fieldset>
            <div class="formData">
               <label for="firstName" class="field">First Name:</label>
               <div class="value">
                  <input type="text" value="" name="firstName" id="firstName">
               </div>
               <label for="lastName" class="field">Last Name:</label>
               <div class="value">
                  <input type="text" value="" name="lastName" id="lastName">
               </div>

               <label for="org" class="field">Organization:</label>
               <div class="value">
                  <input type="text" value="" name="org" id="org">
               </div>

               <label for="comments" class="field">Comments:</label>
               <div class="value">
                  <textarea rows="4" cols="40" name="comments" id="comments" onfocus="clearText();" onblur = "putText();">Please enter your comments</textarea>
               </div>

               <input type="submit" value="Save" id="save" name="save">
            </div>
         </fieldset>
         <br>
         <!--
         <button type="button" onclick="getName();">
         Show Name Info
        </button>
        -->
      </form>
   </div>
</body>

</html>
